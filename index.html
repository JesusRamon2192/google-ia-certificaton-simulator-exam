<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google AI Exam Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Theme Switcher Dropdown -->
    <div class="theme-switcher">
      <div class="theme-dropdown" id="theme-dropdown">
        <button
          class="theme-dropdown-btn"
          id="theme-dropdown-btn"
          aria-label="Cambiar Tema"
          title="Cambiar Tema"
        >
          <svg
            class="active-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg
            class="chevron-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="theme-options">
          <button class="theme-option" data-theme-value="light">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            Claro
          </button>
          <button class="theme-option" data-theme-value="dark">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            Oscuro
          </button>
          <button class="theme-option active" data-theme-value="system">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            Sistema
          </button>
        </div>
      </div>
    </div>

    <div class="container">
      <h1>Google AI Certification – Exam Simulator</h1>

      <!-- Question Generation Panel -->
      <div id="generation-panel" class="generation-panel">
        <h3>🤖 Generar Examen</h3>
        <p class="generation-description">
          Genera un examen personalizado de máximo 60 preguntas sobre
          cualquier tema de la Certificación de IA de Google Cloud
        </p>
        <div class="generation-controls">
          <label for="exam-size" class="exam-size-label">
            ¿Cuántas preguntas deseas?
          </label>
          <div class="exam-size-input-group">
            <input
              type="number"
              id="exam-size"
              min="1"
              max="65"
              value="10"
              class="question-count-input"
            />
            <button id="generate-exam" class="btn-generate-exam">
              🎯 Generar Examen
            </button>
          </div>
        </div>
        <div id="generation-status" class="generation-status hidden"></div>
      </div>

      <div id="quiz-box">
        <p id="question-counter"></p>
        <h2 id="question"></h2>

        <form id="options"></form>

        <div class="buttons">
          <button id="prev">Anterior</button>
          <button id="next">Siguiente</button>
        </div>
      </div>

      <div id="result-box" class="hidden">
        <h2>Resultado</h2>
        <p id="score"></p>
        <button onclick="location.reload()">Reintentar</button>

        <!-- Incorrect Questions Review Section -->
        <div
          id="incorrect-questions-container"
          class="incorrect-questions-container"
        ></div>
      </div>
    </div>

    <!-- Toasts Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="env.js?v=4"></script>
    <script src="config.js?v=4"></script>
    <script src="questionGenerator.js?v=9"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
